# Piranha Supplies Voice — call.piranhasupplies.com
# Copiar para: /etc/nginx/sites-available/piranha-voice
# Ativar com: ln -s /etc/nginx/sites-available/piranha-voice /etc/nginx/sites-enabled/piranha-voice

server {
    listen 80;
    server_name call.piranhasupplies.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name call.piranhasupplies.com;

    ssl_certificate     /etc/letsencrypt/live/call.piranhasupplies.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/call.piranhasupplies.com/privkey.pem;

    # Webhooks Twilio
    location /webhook/ {
        proxy_pass         http://127.0.0.1:5000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # Admin — chamadas de teste
    location /admin/ {
        proxy_pass         http://127.0.0.1:5000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # Health check
    location /health {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
    }
}
