version: "3.7"

services:
  piranha_leads:
    image: piranha-leads:latest
    env_file:
      - /opt/piranha-leads/.env
    volumes:
      - /opt/piranha-leads/data:/app/data
    networks:
      - PiranhaNet
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.piranha-leads.rule=Host(`scraping.piranhasupplies.com`)"
        - "traefik.http.routers.piranha-leads.entrypoints=websecure"
        - "traefik.http.routers.piranha-leads.tls=true"
        - "traefik.http.routers.piranha-leads.tls.certresolver=letsencryptresolver"
        - "traefik.http.services.piranha-leads.loadbalancer.server.port=8000"

networks:
  PiranhaNet:
    external: true
    name: PiranhaNet
